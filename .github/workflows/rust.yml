name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + Windows GNU target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo zigbuild --release --target x86_64-pc-windows-gnu

      - name: Rename artifact
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          cp target/x86_64-pc-windows-gnu/release/rscapt.exe rscapt-${VERSION}-windows-x64.exe

      - name: Upload artifact (every build)
        uses: actions/upload-artifact@v4
        with:
          name: rscapt-windows-x64
          path: rscapt-*-windows-x64.exe
          retention-days: 30

      - name: Create GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rscapt-*-windows-x64.exe
          generate_release_notes: true
